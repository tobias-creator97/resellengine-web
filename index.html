<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ResellEngine — Scannen. Bewerten. Verkaufen.</title>
<link rel="icon" href="assets/icon.png">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/site.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/Primitives.jsx"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/Sections.jsx"></script>

<script>
// Tweakable defaults — persisted by the host
const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "blue-cyan",
  "phoneStyle": "floating",
  "density": "spacious",
  "showTestimonials": true
}/*EDITMODE-END*/;

const ACCENT_GRADS = {
  "blue-cyan":   "linear-gradient(135deg, #6F7EFF 0%, #7FD7FF 100%)",
  "violet-cyan": "linear-gradient(135deg, #9F7CFF 0%, #7FD7FF 100%)",
  "mono":        "linear-gradient(135deg, #F5F5F7 0%, #AEB9FF 100%)",
};
function applyTweaks(t) {
  document.documentElement.style.setProperty('--accent-grad', ACCENT_GRADS[t.accent] || ACCENT_GRADS['blue-cyan']);
  document.body.dataset.density = t.density;
  document.body.dataset.phone = t.phoneStyle;
  document.body.dataset.testimonials = t.showTestimonials ? '1' : '0';
}
applyTweaks(TWEAKS);
</script>

<script type="text/babel">
function App() {
  return (
    <>
      <Nav/>
      <Hero/>
      <WhatItIs/>
      <Benefits/>
      <Walkthrough/>
      <Compare/>
      <Trust/>
      <FAQ/>
      <FinalCTA/>
      <Footer/>
      <TweaksPanel/>
    </>
  );
}

function TweaksPanel() {
  const [on, setOn] = React.useState(false);
  const [state, setState] = React.useState(TWEAKS);

  React.useEffect(() => {
    const h = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setOn(true);
      if (e.data.type === '__deactivate_edit_mode') setOn(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  const set = (k, v) => {
    const next = { ...state, [k]: v };
    setState(next);
    applyTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  if (!on) return null;

  const Row = ({ label, children }) => (
    <div style={{ display: 'grid', gap: 8 }}>
      <div style={{ fontSize: '0.72rem', fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--re-fg-3)' }}>{label}</div>
      {children}
    </div>
  );
  const Seg = ({ value, onChange, options }) => (
    <div style={{ display: 'flex', gap: 4, padding: 4, background: 'rgba(0,0,0,0.4)', borderRadius: 999, border: '1px solid var(--re-border)' }}>
      {options.map(o => (
        <button key={o.v} onClick={() => onChange(o.v)} style={{
          flex: 1, padding: '7px 10px', borderRadius: 999,
          background: value === o.v ? 'var(--accent-grad, var(--re-gradient))' : 'transparent',
          color: value === o.v ? '#0A0E1A' : 'var(--re-fg-2)',
          border: 0, fontWeight: 600, fontSize: '0.78rem', cursor: 'pointer',
          fontFamily: 'inherit',
        }}>{o.l}</button>
      ))}
    </div>
  );

  return (
    <div style={{
      position: 'fixed', right: 20, bottom: 20, zIndex: 200,
      width: 280, padding: 18,
      background: 'rgba(14,19,34,0.92)', backdropFilter: 'blur(24px)', WebkitBackdropFilter: 'blur(24px)',
      border: '1px solid var(--re-border-hover)', borderRadius: 20,
      boxShadow: '0 24px 60px rgba(0,0,0,0.5)',
      display: 'grid', gap: 14,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ fontSize: '0.9rem', fontWeight: 700 }}>Tweaks</div>
        <div style={{ fontSize: '0.72rem', color: 'var(--re-fg-3)' }}>Live</div>
      </div>

      <Row label="Akzent">
        <Seg value={state.accent} onChange={v => set('accent', v)} options={[
          { v: 'blue-cyan', l: 'Blau→Cyan' },
          { v: 'violet-cyan', l: 'Violett' },
          { v: 'mono', l: 'Mono' },
        ]}/>
      </Row>

      <Row label="Hero Phone">
        <Seg value={state.phoneStyle} onChange={v => set('phoneStyle', v)} options={[
          { v: 'floating', l: 'Floating' },
          { v: 'flat', l: 'Flat' },
          { v: 'stacked', l: '2 Phones' },
        ]}/>
      </Row>

      <Row label="Dichte">
        <Seg value={state.density} onChange={v => set('density', v)} options={[
          { v: 'spacious', l: 'Luftig' },
          { v: 'tight', l: 'Kompakt' },
        ]}/>
      </Row>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<style>
/* Tweak-driven styles */
body[data-density="tight"] section { padding-top: 60px !important; padding-bottom: 60px !important; }

/* Hero phone variants (basic hooks) */
body[data-phone="flat"] .hero-grid img[src*="scan-result"] { box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
</style>
</body>
</html>
